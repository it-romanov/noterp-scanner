<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NotERP Scanner</title>
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- html5-qrcode v2.3.8 — стабильная, поддержка QR + 1D (EAN-13, Code 128, UPC) -->
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    #header {
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.7);
      font-size: 14px;
      text-align: center;
      flex-shrink: 0;
    }

    #reader-wrap {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    #reader { width: 100%; height: 100%; }
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }

    /* Зелёная вспышка-рамка при успешном скане (200мс) — даёт визуальное подтверждение */
    #flash {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 6px solid #51cf66;
      box-shadow: inset 0 0 30px rgba(81, 207, 102, 0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 80ms ease-out;
    }
    #flash.on { opacity: 1; }

    #status {
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.7);
      font-size: 13px;
      text-align: center;
      min-height: 44px;
      flex-shrink: 0;
    }
    #status.error { color: #ff6b6b; }
    #status.success { color: #51cf66; }

    #cancel-btn {
      padding: 14px;
      background: #2c2c2c;
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #cancel-btn:active { background: #444; }
  </style>
</head>
<body>
  <div id="header">📷 Наведи камеру на баркод</div>
  <div id="reader-wrap">
    <div id="reader"></div>
    <div id="flash"></div>
  </div>
  <div id="status">Запрашиваю доступ к камере…</div>
  <button id="cancel-btn" type="button">Отмена</button>

  <script>
    // ============================================================================
    // NotERP Scanner — single-режим.
    //
    // Один скан → sendData(JSON) → Telegram автоматически закрывает Web App
    // (это документированное поведение sendData для reply-кнопок,
    // см. https://core.telegram.org/api/bots/webapps — раздел Keyboard Button).
    //
    // Контракт payload: {type: "scan_result", code: "<text>", format: "<EAN_13|...>", ts: <ms>}
    // Поле "type" — для роутинга на handlers/web_app.py::WEB_APP_HANDLERS.
    //
    // Stream-режим (накопление + один sendData при «Готово») — отдельная ветка,
    // запланирована в CLAUDE/scanner/PLAN.md. На текущий момент НЕ реализована
    // именно потому что Telegram закрывает Web App после каждого sendData
    // (подтверждено документацией и сессией 03.05.2026).
    // ============================================================================
    (function () {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      const statusEl = document.getElementById('status');
      const cancelBtn = document.getElementById('cancel-btn');
      const flashEl = document.getElementById('flash');
      let html5QrCode = null;
      let scanFinished = false;

      function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = cls || '';
      }

      function closeApp() {
        if (tg && typeof tg.close === 'function') {
          tg.close();
        } else {
          window.close();
        }
      }

      function flashOk() {
        flashEl.classList.add('on');
        setTimeout(function () { flashEl.classList.remove('on'); }, 200);
      }

      function sendResult(decodedText, decodedResult) {
        if (scanFinished) return;
        scanFinished = true;

        const format = (decodedResult
          && decodedResult.result
          && decodedResult.result.format
          && decodedResult.result.format.formatName) || 'UNKNOWN';

        const payload = {
          type: 'scan_result',
          code: decodedText,
          format: format,
          ts: Date.now()
        };

        setStatus('✅ Распознано: ' + decodedText, 'success');
        flashOk();

        const finalize = function () {
          if (tg && typeof tg.sendData === 'function') {
            try {
              tg.sendData(JSON.stringify(payload));
            } catch (e) {
              setStatus('Ошибка sendData: ' + e.message, 'error');
              return;
            }
            // Telegram сам закроет Web App после sendData, страховка на 200мс.
            setTimeout(closeApp, 200);
          } else {
            setStatus('Telegram WebApp недоступен. Код: ' + decodedText, 'error');
          }
        };

        if (html5QrCode && html5QrCode.isScanning) {
          html5QrCode.stop().then(finalize).catch(finalize);
        } else {
          finalize();
        }
      }

      function startScanner() {
        html5QrCode = new Html5Qrcode("reader", {
          // Явно перечисляем форматы — иначе по дефолту читает только QR.
          formatsToSupport: [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.ITF,
            Html5QrcodeSupportedFormats.DATA_MATRIX
          ],
          verbose: false
        });

        const config = {
          fps: 10,
          qrbox: function (vw, vh) {
            return { width: Math.floor(vw * 0.8), height: Math.floor(vh * 0.3) };
          },
          aspectRatio: window.innerHeight / window.innerWidth
        };

        html5QrCode.start(
          { facingMode: "environment" },
          config,
          sendResult,
          /* onScanFailure */ function () { /* кадры без распознавания — это норма */ }
        ).then(function () {
          setStatus('Наведи на баркод. Распознаётся автоматически.');
        }).catch(function (err) {
          setStatus('Камера недоступна: ' + (err && err.message ? err.message : err), 'error');
        });
      }

      cancelBtn.addEventListener('click', function () {
        scanFinished = true;
        if (html5QrCode && html5QrCode.isScanning) {
          html5QrCode.stop().then(closeApp).catch(closeApp);
        } else {
          closeApp();
        }
      });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', startScanner);
      } else {
        startScanner();
      }
    })();
  </script>
</body>
</html>
